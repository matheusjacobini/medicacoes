<meta name="apple-mobile-web-app-title" content="Medicações">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:       #0f172a;
    --surface:  #1e293b;
    --surface2: #273549;
    --border:   #334155;
    --border2:  #475569;
    --accent:   #38bdf8;
    --accent-d: #0ea5e9;
    --success:  #34d399;
    --muted:    #64748b;
    --text:     #f1f5f9;
    --text2:    #94a3b8;
    --day1:     #1e3a5f;
    --pink-bg:  #3b1a2e;
    --pink-txt: #f9a8d4;
    --inactive: #1e293b;
    --r-sm:     8px;
  }

  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

  body {
    font-family:'DM Sans',sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100dvh;
    padding-bottom:env(safe-area-inset-bottom);
    /* FIX #11: suporte a swipe */
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .app-header {
    position:sticky; top:0; z-index:100;
    background:var(--bg);
    border-bottom:1px solid var(--border);
    padding:14px 16px 0;
  }
  .app-header h1 { font-size:15px; font-weight:600; letter-spacing:-0.3px; }
  .app-header p  { font-size:11px; color:var(--muted); margin-top:2px; font-family:'DM Mono',monospace; }

  /* ── SCREEN TABS ── */
  .screen-tabs { display:flex; margin-top:10px; }
  .screen-tab {
    flex:1; padding:8px 0; text-align:center;

// ── FIX #4: data local (não UTC) ─────────────────────────
function hojeLocal() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── STATE ────────────────────────────────────────────────
let currentScreen = 'med';
let currentCiclo  = 1;

// ── FIX #11: swipe horizontal ────────────────────────────
let swipeStartX = 0;
document.addEventListener('touchstart', e => { swipeStartX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - swipeStartX;
  if (Math.abs(dx) < 60) return;
  if (dx < 0 && currentScreen === 'med')  switchScreen('sint');
  if (dx > 0 && currentScreen === 'sint') switchScreen('med');
}, {passive:true});

// ── STORAGE ──────────────────────────────────────────────
const medKey  = (c,d,m) => `med_${c}_${d}_${m}`;
const sintKey = (c,d,s) => `sint_${c}_${d}_${s}`;
const noteKey = (c,d)   => `note_${c}_${d}`;

const isChecked    = (c,d,m) => localStorage.getItem(medKey(c,d,m)) === "1";
const getSintVal   = (c,d,s) => parseInt(localStorage.getItem(sintKey(c,d,s)) || "0");
const setSintVal   = (c,d,s,v) => { localStorage.setItem(sintKey(c,d,s), String(v)); flashSave(); };
const getNote      = (c,d)   => localStorage.getItem(noteKey(c,d)) || "";
const setNote      = (c,d,t) => { localStorage.setItem(noteKey(c,d), t); flashSave(); };

function toggleCheck(c,d,m) {
  const k = medKey(c,d,m);
  const v = localStorage.getItem(k) === "1" ? "0" : "1";
  localStorage.setItem(k,v);
  flashSave();
  return v === "1";
}

// ── FIX #14: indicador de salvo ──────────────────────────
let saveTimer;
function flashSave() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => el.classList.remove('show'), 1500);
}

// ── FIX #8/#9: progress separado por tela ────────────────
function cycleProgressMed(ciclo) {
  const dias = DATA.filter(d => d.ciclo === ciclo);
  let total=0, done=0;
  dias.forEach(d => d.meds.forEach(m => {
    total++;
    if(isChecked(ciclo,d.dia,m)) done++;
  }));
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

function cycleProgressSint(ciclo) {
  const dias = DATA.filter(d => d.ciclo === ciclo);
  // Conta sintomas registrados (qualquer valor > 0)
  let total=0, done=0;
  dias.forEach(d => {
    SINT_ORDERED.forEach(s => {
      total++;
      if(getSintVal(ciclo,d.dia,s.code) > 0) done++;
    });
  });
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

// ── TOAST ────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ── MODAL ────────────────────────────────────────────────
let _noteCallback = null;
function openNoteModal(title, current, cb) {
  document.getElementById('noteModalTitle').textContent = title;
  document.getElementById('noteTextarea').value = current;
  _noteCallback = cb;
  document.getElementById('noteModal').classList.add('open');
  setTimeout(() => document.getElementById('noteTextarea').focus(), 350);
}
function closeNoteModal(save) {
  document.getElementById('noteModal').classList.remove('open');
  if (save && _noteCallback) _noteCallback(document.getElementById('noteTextarea').value.trim());
  _noteCallback = null;
}
document.getElementById('noteModal').addEventListener('click', e => {
  if (e.target === document.getElementById('noteModal')) closeNoteModal(false);
});

// ── TABS DE CICLO ─────────────────────────────────────────
function renderTabs(activeCiclo) {
  const tabs = document.getElementById('cycleTabs');
  tabs.innerHTML = '';
  const progressFn = currentScreen === 'med' ? cycleProgressMed : cycleProgressSint;
  for (let ci=1; ci<=6; ci++) {
    const p = progressFn(ci);
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (ci===activeCiclo?' active':'') + (p.pct===100?' done':'');
    btn.textContent = `Ciclo ${ci}  ${p.pct}%`;
    btn.onclick = () => { currentCiclo=ci; switchScreen(currentScreen); };
    tabs.appendChild(btn);
  }
}

// ── SWITCH SCREEN ─────────────────────────────────────────
function switchScreen(screen) {
  currentScreen = screen;
  document.getElementById('tabMed').classList.toggle('active',  screen==='med');
  document.getElementById('tabSint').classList.toggle('active', screen==='sint');
  if (screen === 'med') renderMed(currentCiclo);
  else                  renderSint(currentCiclo);
}

// ── HELPERS de layout ────────────────────────────────────
function getHeaderTop() {
  const a = document.querySelector('.app-header');
  const c = document.getElementById('cycleTabs');
  return a && c ? a.offsetHeight + c.offsetHeight : 88;
}

function rowClasses(d, hoje) {
  const isPink  = d.dia >= 5 && d.dia <= 10;
  const isFirst = d.dia === 1;
  const isToday = d.dt === hoje;
  const base = ['day-row'];
  if (isFirst) base.push('first-day');
  if (isPink)  base.push('pink-day');
  if (isToday) base.push('today');
  return base.join(' ');
}

// ── DATE CELL (compartilhada) ────────────────────────────
function buildDateCell(d, hoje, ciclo) {
  const isToday = d.dt === hoje;
  const hasNote = getNote(ciclo, d.dia).length > 0;
  const cell = document.createElement('div');
  cell.className = 'date-cell';
  cell.innerHTML = `
    <div class="date-main">${d.data}${hasNote ? '<span class="note-dot"></span>' : ''}</div>
    <div class="date-sub"><span>${d.dsem}</span><span>D${String(d.dia).padStart(2,'0')}</span></div>
    ${isToday ? '<div class="today-badge">● hoje</div>' : ''}
  `;
  cell.onclick = () => {
    const cur = getNote(ciclo, d.dia);
    openNoteModal(`${d.data} · D${String(d.dia).padStart(2,'0')}`, cur, txt => {
      setNote(ciclo, d.dia, txt);
      const main = cell.querySelector('.date-main');
      const dot  = cell.querySelector('.note-dot');
      if (txt.length > 0 && !dot) {
        const sp = document.createElement('span');
        sp.className = 'note-dot';
        main.appendChild(sp);
      } else if (txt.length === 0 && dot) dot.remove();
      if (txt.length > 0) showToast('📝 Nota salva');
    });
  };
  return cell;
}

// ── CYCLE HEADER ─────────────────────────────────────────
function buildCycleHeader(activeCiclo, dias, prog, labelText, labelSuffix) {
  const h = document.createElement('div');
  h.className = 'cycle-header';
  // FIX #2: id único por render via timestamp
  const pid = 'pl_' + Date.now();
  h.innerHTML = `
    <div class="cycle-title">Ciclo ${activeCiclo} de 6 · ${labelText}</div>
    <div class="cycle-dates">${dias[0].data} – ${dias[dias.length-1].data}</div>
    <div class="progress-bar"><div class="progress-fill" id="${pid}" style="width:${prog.pct}%"></div></div>
    <div class="progress-label" id="${pid}_lbl">${prog.done} de ${prog.total} ${labelSuffix} · ${prog.pct}%</div>
  `;
  h._pid = pid;
  return h;
}

// ── RENDER MEDICAÇÃO ────────────────────────────────────
// ════════════════════════════════════════════════════════
function renderMed(activeCiclo) {
  currentCiclo = activeCiclo;
  renderTabs(activeCiclo);
  const app = document.getElementById('app');
  app.innerHTML = '';
  const hoje = hojeLocal();
  const dias  = DATA.filter(d => d.ciclo === activeCiclo);
  const prog  = cycleProgressMed(activeCiclo);

  const hdr = buildCycleHeader(activeCiclo, dias, prog, 'Medicação', 'doses marcadas');
  app.appendChild(hdr);
  const pid = hdr._pid;

  const wrap = document.createElement('div');
  wrap.className = 'days-table';
  wrap.style.cssText = 'padding: 0 16px 8px;';

  // Cabeçalho colunas — FIX: top calculado após render
  const ch = document.createElement('div');
  ch.className = 'col-headers-med';
  ch.innerHTML = `<div class="col-hdr date-hdr">Data</div>` +
    MEDS_INFO.map(m => `<div class="col-hdr">${m.nome}<span>${m.sub}</span></div>`).join('');
  wrap.appendChild(ch);
  requestAnimationFrame(() => { ch.style.top = getHeaderTop() + 'px'; });

  // FIX #7: indicador quando hoje não está neste ciclo
  const hasTodayInCiclo = dias.some(d => d.dt === hoje);
  if (!hasTodayInCiclo) {
    const info = document.createElement('div');
    info.style.cssText = 'font-size:11px; color:var(--muted); padding:4px 0 6px; font-family:DM Mono,monospace; text-align:center;';
    info.textContent = 'hoje não pertence a este ciclo';
    wrap.appendChild(info);
  }

  dias.forEach(d => {
    const isToday = d.dt === hoje;
    const row = document.createElement('div');
    row.className = rowClasses(d, hoje);
    row.style.cssText = 'display:grid; grid-template-columns:90px repeat(4,1fr); gap:3px; align-items:center;';
    if (isToday) setTimeout(() => row.scrollIntoView({behavior:'smooth',block:'center'}), 120);

    row.appendChild(buildDateCell(d, hoje, activeCiclo));

    MEDS_INFO.forEach(m => {
      const cell = document.createElement('div');
      const ativo   = d.meds.includes(m.code);
      const checked = ativo && isChecked(activeCiclo, d.dia, m.code);
      cell.className = 'med-cell' + (!ativo ? ' inactive' : checked ? ' checked' : '');
      if (!ativo) {
        cell.innerHTML = `<div class="dash-icon"></div>`;
      } else {
        cell.innerHTML = `<div class="check-box"><span class="check-icon">✓</span></div>`;
        cell.onclick = () => {
          const now = toggleCheck(activeCiclo, d.dia, m.code);
          cell.classList.toggle('checked', now);
          // FIX #12: vibração tátil
          if (navigator.vibrate) navigator.vibrate(30);
          showToast(now ? `✓ ${m.nome} · ${d.data}` : `${m.nome} · ${d.data} desmarcado`);
          const p2 = cycleProgressMed(activeCiclo);
          const pf = document.getElementById(pid);
          const pl = document.getElementById(pid+'_lbl');
          if (pf) pf.style.width = p2.pct+'%';
          if (pl) pl.textContent = `${p2.done} de ${p2.total} doses marcadas · ${p2.pct}%`;
          renderTabs(activeCiclo);
        };
      }
      row.appendChild(cell);
    });
    wrap.appendChild(row);
  });

  app.appendChild(wrap);

  // Reset
  const ra = document.createElement('div'); ra.className = 'reset-area';
  const rb = document.createElement('button'); rb.className = 'reset-btn';
  rb.textContent = 'Resetar medicações — ciclo ' + activeCiclo;
  rb.onclick = () => {
    if (!confirm(`Apagar todas as marcações de medicação do Ciclo ${activeCiclo}?`)) return;
    dias.forEach(d => d.meds.forEach(m => localStorage.removeItem(medKey(activeCiclo,d.dia,m))));
    renderMed(activeCiclo); showToast('Ciclo ' + activeCiclo + ' resetado');
  };
  ra.appendChild(rb);
  app.appendChild(ra);
}

      const cell = document.createElement('div');
      cell.className = 'sint-cell';
      cell.style.height = '40px';

      const updateCell = () => {
        const v = getSintVal(activeCiclo, d.dia, s.code);
        let bg, tc, icon, label;
        if (s.type === 'bin') {
          const st = v === 1 ? s.on : s.off;
          bg=st.bg; tc=st.tc; icon=st.icon; label=st.label;
        } else {
          // FIX #1: usar levels.length-1 como maxVal
          const lvl = s.levels[v] || s.levels[0];
          bg=lvl.bg; tc=lvl.tc; icon=lvl.icon; label=lvl.label;
        }
        cell.style.background = bg;
        cell.innerHTML = `<span class="sint-icon" style="color:${tc}">${icon}</span><span class="sint-label" style="color:${tc}">${label}</span>`;
      };

      updateCell();

      cell.onclick = () => {
        const cur    = getSintVal(activeCiclo, d.dia, s.code);
        // FIX #1: maxVal correto por tipo
        const maxVal = s.type === 'bin' ? 1 : s.levels.length - 1;
        const next   = cur >= maxVal ? 0 : cur + 1;
        setSintVal(activeCiclo, d.dia, s.code, next);
        updateCell();
        // FIX #12: vibração tátil
        if (navigator.vibrate) navigator.vibrate(20);
        const labels = s.type==='bin' ? ['não','sim'] : s.levels.map(l=>l.label);
        showToast(`${s.nome} · ${labels[next]}`);
      };

      row.appendChild(cell);
    });
    inner.appendChild(row);
  });

  tableWrap.appendChild(inner);
  outerWrap.appendChild(hdrWrap);
  outerWrap.appendChild(tableWrap);
  app.appendChild(outerWrap);

  // FIX #6: reset separado para sintomas e para notas
  const ra = document.createElement('div'); ra.className = 'reset-area';

  const rbSint = document.createElement('button');
  rbSint.className = 'reset-btn';
  rbSint.textContent = 'Resetar sintomas — ciclo ' + activeCiclo;
  rbSint.onclick = () => {
    if (!confirm(`Apagar sintomas do Ciclo ${activeCiclo}? As notas serão mantidas.`)) return;
    dias.forEach(d => SINT_ORDERED.forEach(s => localStorage.removeItem(sintKey(activeCiclo,d.dia,s.code))));
    renderSint(activeCiclo); showToast('Sintomas resetados');
  };

  const rbNotes = document.createElement('button');
  rbNotes.className = 'reset-btn danger';
  rbNotes.textContent = 'Apagar notas — ciclo ' + activeCiclo;
  rbNotes.onclick = () => {
    if (!confirm(`Apagar TODAS as notas do Ciclo ${activeCiclo}? Esta ação não pode ser desfeita.`)) return;
    dias.forEach(d => localStorage.removeItem(noteKey(activeCiclo,d.dia)));
    renderSint(activeCiclo); showToast('Notas apagadas');
  };

  ra.appendChild(rbSint);
  ra.appendChild(rbNotes);
  app.appendChild(ra);
}

// ── INIT ─────────────────────────────────────────────────
function detectCicloAtual() {
  const hoje = hojeLocal();
  const found = DATA.find(d => d.dt === hoje);
  return found ? found.ciclo : 1;
}

currentCiclo = detectCicloAtual();
renderMed(currentCiclo);
</script>
