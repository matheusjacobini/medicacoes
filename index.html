  .tab-btn {

  .day-row-med.today .date-cell,
  .day-row-sint.today .date-cell { background: #0c2e1a; border-radius: var(--r-sm) 0 0 var(--r-sm); }
  .today .date-main { color: var(--success) !important; }
  .today .date-sub  { color: #34d39999 !important; }

  /* ── DATE CELL ── */

    background: var(--surface); border-radius: var(--r-sm);

    min-height: 40px; justify-content: center;

  .date-cell:active { background: var(--surface2); }

  .note-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); margin-left: 3px; vertical-align: middle; }

  /* ── MED CELL ── */

    background: var(--surface); border-radius: var(--r-sm);
    display: flex; align-items: center; justify-content: center;
    height: 40px; cursor: pointer; transition: background 0.15s, transform 0.1s;
    user-select: none;
  }

  .med-cell.inactive { background: var(--inactive); cursor: default; }

  .check-box {
    width: 22px; height: 22px; border-radius: 6px;

    background: var(--surface); border-radius: var(--r-sm);

  .toast {
    position: fixed; bottom: 24px; left: 50%;

  .reset-btn {
    background: transparent; border: 1px solid var(--border);

  }
  .reset-btn:active { background: var(--surface); }

</head>

// Dividimos em: 4 bins (NAU,DIA,CON,FEB) + 2 bins (BOC,BCS) + 3 scales (FAD,DOR,CAB) + 2 scales (APE,SON)
// Total: 11 colunas + 1 data = 12 — largo demais p/ mobile
// Solução: 4 bins + 2 bins + 3 escalas graves + 2 escalas qualidade = 11 cols, usar scroll horizontal na linha
// OU: fazer 2 grupos de colunas com toggle. Vamos usar scroll horizontal por linha.

// ── SCREEN STATE ─────────────────────────────────────────
let currentScreen = 'med';
let currentCiclo  = 1;

function switchScreen(screen) {
  currentScreen = screen;
  document.getElementById('tabMed').classList.toggle('active', screen === 'med');
  document.getElementById('tabSint').classList.toggle('active', screen === 'sint');
  if (screen === 'med')  renderMed(currentCiclo);
  else                   renderSint(currentCiclo);
}

// ── STORAGE ──────────────────────────────────────────────
function medKey(c,d,m)   { return `med_${c}_${d}_${m}`; }
function sintKey(c,d,s)  { return `sint_${c}_${d}_${s}`; }
function noteKey(c,d)    { return `note_${c}_${d}`; }

function isChecked(c,d,m) { return localStorage.getItem(medKey(c,d,m)) === "1"; }
function toggleCheck(c,d,m) {
  const k = medKey(c,d,m);
  const v = localStorage.getItem(k) === "1" ? "0" : "1";
  localStorage.setItem(k,v); return v === "1";
}
function getSintVal(c,d,s)    { return parseInt(localStorage.getItem(sintKey(c,d,s)) || "0"); }
function setSintVal(c,d,s,v)  { localStorage.setItem(sintKey(c,d,s), String(v)); }
function getNote(c,d)         { return localStorage.getItem(noteKey(c,d)) || ""; }
function setNote(c,d,txt)     { localStorage.setItem(noteKey(c,d), txt); }

// ── PROGRESS ────────────────────────────────────────────
function cycleProgress(ciclo) {
  const dias = DATA.filter(d => d.ciclo === ciclo);
  let total=0, done=0;
  dias.forEach(d => d.meds.forEach(m => { total++; if(isChecked(ciclo,d.dia,m)) done++; }));
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

// ── TOAST ───────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ── MODAL DE NOTA ────────────────────────────────────────
let _noteCallback = null;
function openNoteModal(title, current, callback) {
  document.getElementById('noteModalTitle').textContent = title;
  document.getElementById('noteTextarea').value = current;
  _noteCallback = callback;
  document.getElementById('noteModal').classList.add('open');
  setTimeout(() => document.getElementById('noteTextarea').focus(), 350);
}
function closeNoteModal(save) {
  const modal = document.getElementById('noteModal');
  modal.classList.remove('open');
  if (save && _noteCallback) {
    _noteCallback(document.getElementById('noteTextarea').value.trim());
  }
  _noteCallback = null;
}
document.getElementById('noteModal').addEventListener('click', e => {
  if (e.target === document.getElementById('noteModal')) closeNoteModal(false);
});

// ── RENDER CYCLE TABS ────────────────────────────────────
function renderTabs(activeCiclo) {
  const tabs = document.getElementById('cycleTabs');
  tabs.innerHTML = '';
  for (let ci=1; ci<=6; ci++) {
    const p = cycleProgress(ci);
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (ci===activeCiclo?' active':'') + (p.pct===100?' done':'');
    btn.textContent = `Ciclo ${ci}  ${p.pct}%`;
    btn.onclick = () => { currentCiclo=ci; switchScreen(currentScreen); };
    tabs.appendChild(btn);
  }
}

// ── CYCLE HEADER ─────────────────────────────────────────
function buildCycleHeader(activeCiclo, dias, prog, labelText) {
  const d0=dias[0], dN=dias[dias.length-1];
  const h = document.createElement('div');
  h.className = 'cycle-header';
  h.innerHTML = `
    <div class="cycle-title">Ciclo ${activeCiclo} de 6 · ${labelText}</div>
    <div class="cycle-dates">${d0.data} – ${dN.data}</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${prog.pct}%"></div></div>
    <div class="progress-label" id="progLabel">${prog.done} de ${prog.total} doses marcadas · ${prog.pct}%</div>
  `;
  return h;
}

// ── ROW CLASS HELPER ─────────────────────────────────────
function rowClass(d, base, hoje) {
  const isPink = d.dia >= 5 && d.dia <= 10;
  const isToday = d.dt === hoje;
  return base + (d.dia===1?' first-day':'') + (isPink?' pink-day':'') + (isToday?' today':'');
}

// ── DATE CELL ───────────────────────────────────────────
function buildDateCell(d, hoje, ciclo, onNoteSaved) {
  const isToday = d.dt === hoje;
  const hasNote = getNote(ciclo, d.dia).length > 0;
  const cell = document.createElement('div');
  cell.className = 'date-cell';
  cell.innerHTML = `
    <div class="date-main">${d.data}${hasNote ? '<span class="note-dot"></span>' : ''}</div>
    <div class="date-sub"><span>${d.dsem}</span><span>D${String(d.dia).padStart(2,'0')}</span></div>
    ${isToday ? '<div class="today-badge">● hoje</div>' : ''}
  `;
  cell.onclick = () => {
    const cur = getNote(ciclo, d.dia);
    openNoteModal(`${d.data} · D${String(d.dia).padStart(2,'0')}`, cur, (txt) => {
      setNote(ciclo, d.dia, txt);
      // Atualiza dot sem re-render
      const dot = cell.querySelector('.note-dot');
      const main = cell.querySelector('.date-main');
      if (txt.length > 0 && !dot) {
        const sp = document.createElement('span');
        sp.className = 'note-dot';
        main.appendChild(sp);
      } else if (txt.length === 0 && dot) {
        dot.remove();
      }
      if (txt.length > 0) showToast('📝 Nota salva');
      if (onNoteSaved) onNoteSaved();
    });
  };
  return cell;
}

// ── RENDER MEDICAÇÃO ────────────────────────────────────
// ════════════════════════════════════════════════════════
function renderMed(activeCiclo) {
  currentCiclo = activeCiclo;
  renderTabs(activeCiclo);
  const app = document.getElementById('app');
  app.innerHTML = '';

  const dias = DATA.filter(d => d.ciclo === activeCiclo);
  const prog = cycleProgress(activeCiclo);
  const hoje = new Date().toISOString().slice(0,10);

  app.appendChild(buildCycleHeader(activeCiclo, dias, prog, 'Medicação'));

  const wrap = document.createElement('div');
  wrap.className = 'days-table';

  // Cabeçalho colunas
  const ch = document.createElement('div');
  ch.className = 'col-headers-med';
  ch.innerHTML = `<div class="col-hdr date-hdr">Data</div>` +
    MEDS_INFO.map(m=>`<div class="col-hdr">${m.nome}<span>${m.sub}</span></div>`).join('');
  wrap.appendChild(ch);

  dias.forEach(d => {
    const isToday = d.dt === hoje;
    const row = document.createElement('div');
    row.className = rowClass(d, 'day-row-med ', hoje);
    if (isToday) setTimeout(()=>row.scrollIntoView({behavior:'smooth',block:'center'}),120);

    row.appendChild(buildDateCell(d, hoje, activeCiclo, null));

    MEDS_INFO.forEach(m => {
      const cell = document.createElement('div');
      const ativo = d.meds.includes(m.code);
      const checked = ativo && isChecked(activeCiclo, d.dia, m.code);
      cell.className = 'med-cell' + (!ativo?' inactive': checked?' checked':'');
      if (!ativo) {
        cell.innerHTML = `<div class="dash-icon"></div>`;
      } else {
        cell.innerHTML = `<div class="check-box"><span class="check-icon">✓</span></div>`;
        cell.onclick = () => {
          const now = toggleCheck(activeCiclo, d.dia, m.code);
          cell.classList.toggle('checked', now);
          showToast(now ? `✓ ${m.nome} · ${d.data}` : `${m.nome} · ${d.data} desmarcado`);
          const p2 = cycleProgress(activeCiclo);
          document.querySelector('.progress-fill').style.width = p2.pct+'%';
          document.getElementById('progLabel').textContent = `${p2.done} de ${p2.total} doses marcadas · ${p2.pct}%`;
          renderTabs(activeCiclo);
        };
      }
      row.appendChild(cell);
    });
    wrap.appendChild(row);
  });

  app.appendChild(wrap);

  const ra = document.createElement('div'); ra.className='reset-area';
  const rb = document.createElement('button'); rb.className='reset-btn';
  rb.textContent='Resetar ciclo '+activeCiclo;
  rb.onclick=()=>{
    if(!confirm(`Apagar todas as marcações do Ciclo ${activeCiclo}?`)) return;
    dias.forEach(d=>d.meds.forEach(m=>localStorage.removeItem(medKey(activeCiclo,d.dia,m))));
    renderMed(activeCiclo); showToast('Ciclo '+activeCiclo+' resetado');
  };
  ra.appendChild(rb); app.appendChild(ra);
}

  // Faixa B: 2 binários (BOC, BCS) + 3 escalas (FAD, DOR, CAB) + 2 (APE, SON)

  // Decisão: grade de 11 colunas com overflow-x scroll na tabela inteira

  // Wrapper externo sem overflow para o cabeçalho fixo
  const outerWrap = document.createElement('div');

  const tableWrap = document.createElement('div');
  tableWrap.style.cssText = 'overflow-x: auto; padding-bottom: 24px; -webkit-overflow-scrolling: touch;';
  tableWrap.addEventListener('scroll', () => {
    headerScrollWrap.scrollLeft = tableWrap.scrollLeft;
  });

  const SINT_ORDERED = [
    SINT_COLS.find(s=>s.code==='NAU'),
    SINT_COLS.find(s=>s.code==='DIA'),
    SINT_COLS.find(s=>s.code==='CON'),
    SINT_COLS.find(s=>s.code==='FEB'),
    SINT_COLS.find(s=>s.code==='BOC'),
    SINT_COLS.find(s=>s.code==='BCS'),
    SINT_COLS.find(s=>s.code==='FAD'),
    SINT_COLS.find(s=>s.code==='DOR'),
    SINT_COLS.find(s=>s.code==='CAB'),
    SINT_COLS.find(s=>s.code==='APE'),
    SINT_COLS.find(s=>s.code==='SON'),
  ].filter(Boolean);

  const N = SINT_ORDERED.length; // 11
  const DATE_W = 82;
  const COL_W  = 46;
  const GAP    = 3;
  const totalW = DATE_W + N*COL_W + N*GAP;

  const inner = document.createElement('div');
  inner.style.cssText = `min-width:${totalW}px; display:flex; flex-direction:column; gap:3px;`;

  // Cabeçalho das colunas
  const ch = document.createElement('div');
  ch.style.cssText = `display:grid; grid-template-columns:${DATE_W}px repeat(${N},${COL_W}px); gap:${GAP}px; padding-bottom:2px; position:sticky; top:136px; z-index:98; background:var(--bg);`;

  ch.innerHTML = `<div class="col-hdr date-hdr" style="font-size:8.5px">Data</div>` +
    SINT_ORDERED.map(s => {
      return `<div class="col-hdr" style="font-size:8px; padding:4px 1px">${s.nome}</div>`;
    }).join('');
  headerScrollWrap.appendChild(ch);

  dias.forEach(d => {
    const isToday = d.dt === hoje;
    const row = document.createElement('div');
    row.style.cssText = `display:grid; grid-template-columns:${DATE_W}px repeat(${N},${COL_W}px); gap:${GAP}px; align-items:center;`;

    // Classes de destaque na linha
    const isPink = d.dia>=5 && d.dia<=10;
    if (d.dia===1)   row.classList.add('day-row-sint','first-day');
    else if (isPink) row.classList.add('day-row-sint','pink-day');
    else             row.classList.add('day-row-sint');
    if (isToday) {
      row.classList.add('today');
      setTimeout(()=>row.scrollIntoView({behavior:'smooth',block:'center'}),120);
    }

    row.appendChild(buildDateCell(d, hoje, activeCiclo, null));

    SINT_ORDERED.forEach(s => {
      const cell = document.createElement('div');
      cell.className = 'sint-cell';
      cell.style.height = '40px';

      const updateCell = () => {
        const v = getSintVal(activeCiclo, d.dia, s.code);
        let bg, tc, icon, label;
        if (s.type === 'bin') {
          const state = v === 1 ? s.on : s.off;
          bg=state.bg; tc=state.tc; icon=state.icon; label=state.label;
        } else {
          const lvl = s.levels[v] || s.levels[0];
          bg=lvl.bg; tc=lvl.tc; icon=lvl.icon; label=lvl.label;
        }
        cell.style.background = bg;
        cell.innerHTML = `<span class="sint-icon" style="color:${tc}">${icon}</span><span class="sint-label" style="color:${tc}">${label}</span>`;
      };

      updateCell();

      cell.onclick = () => {
        const cur = getSintVal(activeCiclo, d.dia, s.code);
        const maxVal = s.type==='bin' ? 1 : 3;
        const next = cur >= maxVal ? 0 : cur+1;
        setSintVal(activeCiclo, d.dia, s.code, next);
        updateCell();
        const labels = s.type==='bin'
          ? ['não','sim']
          : s.levels.map(l=>l.label);
        showToast(`${s.nome.replace('\n',' ')} · ${labels[next]}`);
      };

      row.appendChild(cell);
    });

    inner.appendChild(row);
  });

  tableWrap.appendChild(inner);
  outerWrap.appendChild(headerScrollWrap);
  outerWrap.appendChild(tableWrap);
  app.appendChild(outerWrap);

  const ra = document.createElement('div'); ra.className='reset-area';
  const rb = document.createElement('button'); rb.className='reset-btn';
  rb.textContent='Resetar sintomas ciclo '+activeCiclo;
  rb.onclick=()=>{
    if(!confirm(`Apagar todos os sintomas do Ciclo ${activeCiclo}?`)) return;
    dias.forEach(d=>SINT_ORDERED.forEach(s=>localStorage.removeItem(sintKey(activeCiclo,d.dia,s.code))));
    dias.forEach(d=>localStorage.removeItem(noteKey(activeCiclo,d.dia)));
    renderSint(activeCiclo); showToast('Sintomas ciclo '+activeCiclo+' resetados');
  };
  ra.appendChild(rb); app.appendChild(ra);
}

// ── INIT ────────────────────────────────────────────────
function detectCicloAtual() {
  const hoje = new Date().toISOString().slice(0,10);
  const found = DATA.find(d => d.dt === hoje);
  return found ? found.ciclo : 1;
}

currentCiclo = detectCicloAtual();
renderMed(currentCiclo);
</script>
</body>
